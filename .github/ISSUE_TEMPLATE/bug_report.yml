name: Bug Report
description: File a bug report
title: "fix: <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, one-line summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably trigger the bug.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser (if frontend), and affected package (app / api / sdk / processing).
      placeholder: |
        - Node:
        - OS:
        - Browser (if applicable):
        - Package:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / logs
      description: Attach screenshots, error output, or stack traces if available.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest version of the affected package.
          required: true
