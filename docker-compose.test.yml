version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xstreamroll_test
      POSTGRES_USER: xstreamroll
      POSTGRES_PASSWORD: xstreamroll
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d xstreamroll_test -U xstreamroll"]
      interval: 2s
      timeout: 2s
      retries: 15
