# Ingress routing for external traffic — issue #325.
# ---------------------------------------------------------------------------
# Routes:
#   • https://<host>/api/*    -> api:3001
#   • https://<host>/         -> app:3000
#
# Required before this manifest works in any real cluster:
#   1. Set `spec.rules[0].host` to your real hostname.
#   2. Set `spec.tls[0].hosts[0]` and `secretName` to the same host.
#      The convention is `<host>-tls` so cert-manager's defaulting
#      names match.
#   3. Choose a ClusterIssuer via the `cert-manager.io/cluster-issuer`
#      annotation. The cluster must have cert-manager installed —
#      see k8s/50-cert-issuer.yaml and k8s/README.md for options.
#   4. The `nginx.ingress.kubernetes.io/ssl-redirect: "true"`
#      annotation upgrades any accidental HTTP request to HTTPS so
#      cleartext traffic never reaches the API or app once the cert
#      is issued.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xstreamroll
  namespace: xstreamroll
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Force HTTPS for every request — cleartext HTTP requests are
    # permanently redirected (301) to the same path over TLS.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Cert-manager will mint a TLS cert into `<host>-tls` using this
    # ClusterIssuer. Swap to `letsencrypt-prod` (see
    # k8s/50-cert-issuer.yaml) once your hostname resolves publicly.
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  # Use the modern field instead of the deprecated
  # `kubernetes.io/ingress.class` annotation (removed in 1.22+).
  ingressClassName: nginx
  # !! REPLACE-ME: xstreamroll.example.com is a placeholder so this
  # manifest commits cleanly. cert-manager uses this exact host for
  # the ACME http-01 challenge, so the hostname MUST resolve publicly
  # before `letsencrypt-staging` or `letsencrypt-prod` will mint a
  # cert. Use `selfsigned-issuer` if your cluster only has private DNS.
  tls:
    - hosts:
        - xstreamroll.example.com  # REPLACE-ME
      secretName: xstreamroll.example.com-tls  # REPLACE-ME: keep in sync with `hosts`
  # REPLACE-ME: same hostname as above.
  rules:
    - host: xstreamroll.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 3000
