# PostgreSQL stateful workload for the XStreamRoll platform.
# ---------------------------------------------------------------------------
# Provisions a single-replica Postgres 14 StatefulSet with a 10Gi PVC,
# a headless Service for stable DNS, a ConfigMap exposing `POSTGRES_DB`,
# and a Secret template holding the admin user/password used by the
# API container. Modify the Secret's `stringData` block (or run the
# documented `kubectl create secret` command in README.md) before
# rolling this manifest, otherwise the API will fail to connect.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: xstreamroll
type: Opaque
# SECURITY: Replace the placeholders BEFORE applying this manifest in
# any non-development environment. Commit-time placeholders are not
# secrets — they are recommendations.
#
# These three keys are consumed by the Postgres container itself via
# `envFrom.secretRef` on the StatefulSet below — they are what the
# official postgres image reads to create the initial database and
# user on first boot. The API does NOT read them; it uses its own
# `api-secrets` Secret (k8s/20-api.yaml) which holds the fully-formed
# `DATABASE_URL` connection string. (See k8s/README.md for why both
# Secrets are required rather than re-using these values.)
stringData:
  POSTGRES_DB: xstreamroll
  POSTGRES_USER: xstreamroll
  POSTGRES_PASSWORD: CHANGEME-postgres-password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: xstreamroll
data:
  POSTGRES_DB: xstreamroll
  # Postgres shared_buffers is set to a small fraction of the 512Mi
  # request. Tune in production.
  POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: xstreamroll
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: xstreamroll
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: xstreamroll
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: false # the official postgres image runs as the `postgres` uid
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:14-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
            - configMapRef:
                name: postgres-config
          readinessProbe:
            exec:
              # pg_isready is the canonical readiness check for Postgres.
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Init scripts are mounted from the ConfigMap generated by
            # Kustomize (see ../../k8s/kustomization.yaml). The file
            # runs once when the PVC is first attached.
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/schema.sql
              subPath: schema.sql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-script
          configMap:
            name: postgres-init
            items:
              - key: schema.sql
                path: schema.sql
